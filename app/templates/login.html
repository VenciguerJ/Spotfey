<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body>
    {% if error_message %}
        <p style="color: red">{{ error_message }}</p>
    {% endif %}
    <form action="/submit" method="post">
        <div>
            <h1>Informações de login</h1>
            <div class="form-group">
                <label for="nome">Nome:
                    <input type="text" name="form_name" class="form-control">
                </label>
                <label for="User">
                    Usuário
                    <input type="text" name="form_user" class="form-control">
                </label>
            </div>
            <div class="form-group">
                <label for="Password">
                    crie uma senha
                    <input type="password" name="form_password" class="form-control">
                </label>
                <label for="Password">
                    confirme a senha
                    <input type="password" name="form_confirm_password" class="form-control">
                </label>
            </div>
        </div>
        <div>
            <h1>Perguntas de Usuário</h1>
            <div class="form-group">
                <label for="type_user">
                    Nos conte por que você veio
                    <input type="checkbox" name="form_type_1">
                    Estou aqui para escutar músicas
                    <input type="checkbox" name="form_type_2">
                    Quero mostrar minhas músicas
                </label>
            </div>
        </div>
        <input type="submit" value="Enviar dados">
    </form>
</body>
</html>
