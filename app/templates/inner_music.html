<!DOCTYPE html>
<html lang="`pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer"/>


    <link rel="shortcut icon" type="imagex/png" href="../static/assets/imagem de música.ico">
    <link rel="stylesheet" href="{{url_for('static', filename='CSS/utils.css')}}">
    <link rel="stylesheet" href="{{url_for('static', filename='CSS/innermusic.css')}}">
    <title>Cadastrar uma nova música</title>
</head>
<body>
    <header>
        <h1>Postar uma nova música!</h1>
    </header>
    <nav class="default-menu">
        <i class="fa-solid fa-bars"></i>
        <ul>
            <li class="menu-card js-redirect-register">
                <i class="fa-solid fa-user js-redirect-register"></i>
                <a href="{{url_for('register')}}" class="menu-text-card">Entrar</a>
            </li>
            <li class="menu-card js-redirect-home">
                <i class="fa-solid fa-house js-redirect-home"></i>
                <a href="{{url_for('index')}}" class="menu-text-card">home</a>
            </li>
            </li>
            <li class="menu-card js-redirect-logout">
                <i class="fa-solid fa-arrow-right-from-bracket js-redirect-logout"></i>
                <a href="{{url_for('logout')}}" class="menu-text-card">Sair</a>
            </li>
        </ul>
    </nav>
    <main>
        <img src="../static/assets/otaku.gif" alt="Imagem de mulher ">
        <div>
            <div>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert-danger" role="alert">
                            {% for message in messages %}
                                <p>{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
            </div>
            <form action="{{url_for('innermusic')}}" method="post" enctype="multipart/form-data" id="center-div">
                <label for="Nome">Coloque um nome nesta musica!</label>
                <input type="text" id="Nome" name="form-nome-musica" placeholder="Digite aqui o nome da música">
                
                <label for="file-upload" class="label-file">Selecione a música</label>        
                <input type="file" name="form-arquivo-musica" id="file-upload" class="hidden">
                <span id="file-name"></span>
    
                <label for="image-music" class="label-file">Coloque uma foto nessa obra de arte</label>
                <input type="file" name="form-imagem-musica" class="hidden" id="image-music">
                <span id="image-name"></span>
    
                <label>pronto para lançar mais um hit?</label>
                <input type="submit" value="SIM!" class="default-button">
            </form>
        </div>
    </main>
    <script src="{{url_for('static', filename='JS/utils.js')}}"></script>
</body>
</html>
